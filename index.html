<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D CSS Merhaba</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #222;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden; /* Taşmaları gizle */
            perspective: 1200px; /* 3D derinliği için perspektif */
        }

        .text-3d-container {
            display: flex;
            transform-style: preserve-3d;
            transform: rotateX(0deg) rotateY(0deg); /* Başlangıç dönüşü */
            animation: containerRotate 15s infinite linear; /* Tüm kelime için dönüş animasyonu */
        }

        .text-3d-char {
            font-size: 8em;
            color: #fff;
            position: relative;
            transform-style: preserve-3d;
            margin: 0 -5px; /* Harfler arasında hafif çakışma için */
            transition: transform 0.5s ease-out; /* Hover efekti için geçiş */
        }

        .text-3d-char:hover {
            transform: translateZ(50px) rotateY(10deg); /* Hover'da öne çıkma ve dönme */
        }

        /* Her harfin 3D yüzeylerini oluşturma */
        .text-3d-char::before,
        .text-3d-char::after {
            content: attr(data-char); /* Harfin kendisini içerik olarak kullan */
            position: absolute;
            top: 0;
            left: 0;
            color: #ccc; /* Yan yüzeylerin rengi */
            text-shadow: none; /* Yan yüzeylerde gölge olmasın */
            transform-origin: left center; /* Dönüşüm merkezi */
            backface-visibility: hidden; /* Arka yüzeylerin görünürlüğünü ayarla */
        }

        /* Arka yüzey */
        .text-3d-char::before {
            transform: translateZ(-20px) rotateY(180deg); /* Arkaya doğru it ve ters çevir */
            color: #888; /* Arka yüzeyin rengi */
        }

        /* Sağ yüzeyler (derinlik efekti) */
        .text-3d-char span {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-origin: left center;
            backface-visibility: hidden;
            color: #aaa; /* Derinlik rengi */
        }

        /* Derinlik katmanları */
        .text-3d-char span:nth-child(1) { transform: translateZ(-1px); }
        .text-3d-char span:nth-child(2) { transform: translateZ(-2px); }
        .text-3d-char span:nth-child(3) { transform: translateZ(-3px); }
        .text-3d-char span:nth-child(4) { transform: translateZ(-4px); }
        .text-3d-char span:nth-child(5) { transform: translateZ(-5px); }
        .text-3d-char span:nth-child(6) { transform: translateZ(-6px); }
        .text-3d-char span:nth-child(7) { transform: translateZ(-7px); }
        .text-3d-char span:nth-child(8) { transform: translateZ(-8px); }
        .text-3d-char span:nth-child(9) { transform: translateZ(-9px); }
        .text-3d-char span:nth-child(10) { transform: translateZ(-10px); }
        .text-3d-char span:nth-child(11) { transform: translateZ(-11px); }
        .text-3d-char span:nth-child(12) { transform: translateZ(-12px); }
        .text-3d-char span:nth-child(13) { transform: translateZ(-13px); }
        .text-3d-char span:nth-child(14) { transform: translateZ(-14px); }
        .text-3d-char span:nth-child(15) { transform: translateZ(-15px); }
        .text-3d-char span:nth-child(16) { transform: translateZ(-16px); }
        .text-3d-char span:nth-child(17) { transform: translateZ(-17px); }
        .text-3d-char span:nth-child(18) { transform: translateZ(-18px); }
        .text-3d-char span:nth-child(19) { transform: translateZ(-19px); }
        .text-3d-char span:nth-child(20) { transform: translateZ(-20px); } /* En arkadaki katman */


        @keyframes containerRotate {
            0% { transform: rotateX(10deg) rotateY(0deg); }
            25% { transform: rotateX(10deg) rotateY(90deg); }
            50% { transform: rotateX(10deg) rotateY(180deg); }
            75% { transform: rotateX(10deg) rotateY(270deg); }
            100% { transform: rotateX(10deg) rotateY(360deg); }
        }
    </style>
</head>
<body>
    <div class="text-3d-container">
        <div class="text-3d-char" data-char="M">M</div>
        <div class="text-3d-char" data-char="e">e</div>
        <div class="text-3d-char" data-char="r">r</div>
        <div class="text-3d-char" data-char="h">h</div>
        <div class="text-3d-char" data-char="a">a</div>
        <div class="text-3d-char" data-char="b">b</div>
        <div class="text-3d-char" data-char="a">a</div>
    </div>

    <script>
        // Her harfe derinlik katmanlarını ekle
        document.querySelectorAll('.text-3d-char').forEach(charElement => {
            for (let i = 0; i < 20; i++) { // 20 katman derinlik için
                const span = document.createElement('span');
                span.textContent = charElement.textContent; // Harfin içeriğini kopyala
                charElement.appendChild(span);
            }
        });
    </script>
</body>
</html>
