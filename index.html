<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ŞRK-1 MOBILE</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top, #111827, #000);
    color:white;
}

header{
    text-align:center;
    padding:18px;
    font-size:24px;
    color:#00f7ff;
    text-shadow:0 0 10px #00f7ff;
}

.container{
    max-width:480px;
    margin:auto;
    padding:10px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
    margin:10px 0;
    box-shadow:0 0 10px rgba(0,247,255,0.1);
}

input, select, button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    font-size:15px;
}

input, select{
    background:#111;
    color:white;
}

button{
    background:#00f7ff;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    transform:scale(1.02);
}

pre{
    white-space:pre-wrap;
    background:#111;
    padding:15px;
    border-radius:10px;
    min-height:120px;
}
</style>
</head>

<body>

<header>🎵 ŞRK-1 MOBILE AI</header>

<div class="container">

<div class="card">
<input id="songName" placeholder="Şarkı adı yaz">

<select id="mood">
    <option value="fun">😊 Eğlenceli</option>
    <option value="sad">😢 Üzüntülü</option>
    <option value="love">💔 Aşk / Melankoli</option>
</select>

<button onclick="generate()">Şarkı üret</button>
</div>

<div class="card">
<pre id="out">Şarkı burada görünecek...</pre>
</div>

</div>

<script>

/* =========================
   🧠 ÖN EĞİTİLMİŞ VERİLER
   ========================= */

const data = {
    fun: {
        words: ["dans", "gülmek", "sokak", "ışık", "parti", "renkli", "coşku", "şarkı", "enerji"],
        verbs: ["zıplar", "güler", "koşar", "patlar", "parlar", "döner", "çığlık atar"]
    },

    sad: {
        words: ["yağmur", "gece", "sessizlik", "gölge", "soğuk", "kayıp", "gözyaşı", "rüzgar"],
        verbs: ["ağlar", "bekler", "kaybolur", "söner", "üşür", "susar", "dağılır"]
    },

    love: {
        words: ["kalp", "aşk", "özlem", "rüya", "dokunuş", "bakış", "gece", "hayal"],
        verbs: ["yanar", "arar", "özler", "fısıldar", "bekler", "çarpılır", "kaybolur"]
    }
};

function pick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

/* =========================
   🎤 ŞARKI ÜRETİCİ
   ========================= */

function generate(){

    let name = document.getElementById("songName").value || "İsimsiz Şarkı";
    let mood = document.getElementById("mood").value;

    let d = data[mood];

    let song =
`🎵 ${name} 🎵

[Verse 1]
${pick(d.words)} içinde ${pick(d.verbs)} bir hikaye
gece ${pick(d.words)} gibi üzerimize çöker
kalbim ${pick(d.verbs)} senin için

[Chorus]
${name}, ${name}
içimde ${pick(d.words)} var
bu dünya ${pick(d.verbs)} ama sen yoksun

[Verse 2]
${pick(d.words)} sokaklarda seni ararım
rüzgar ${pick(d.verbs)} adını taşır
ben ${pick(d.words)} içinde kaybolurum

[Outro]
${name}...
her şey artık ${pick(d.words)} bir hikaye`;

    document.getElementById("out").innerText = song;
}

</script>

</body>
</html>
