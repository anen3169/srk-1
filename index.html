<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>3D Merhaba Animasyonu</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      margin: 0;
    }
    h1 {
      font-size: 5em;
      font-family: 'Arial Black', sans-serif;
      color: #fff;
      text-shadow: 0 0 20px #00f0ff, 0 0 40px #00f0ff, 0 0 60px #00f0ff;
      animation: spin 5s infinite linear, glow 2s infinite alternate;
      transform-style: preserve-3d;
    }
    @keyframes spin {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(360deg); }
    }
    @keyframes glow {
      from { text-shadow: 0 0 20px #00f0ff; }
      to { text-shadow: 0 0 40px #ff00ff, 0 0 60px #ff00ff; }
    }
  </style>
</head>
<body>
  <h1>Merhaba</h1>
</body>
</html>
