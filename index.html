<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Kod Asistanı</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0f172a;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:95%;
max-width:1200px;
height:90vh;
background:#111827;
border-radius:20px;
overflow:hidden;
display:flex;
flex-direction:column;
box-shadow:0 0 40px rgba(0,0,0,.5);
}

.header{
padding:20px;
background:#1e293b;
font-size:24px;
font-weight:bold;
text-align:center;
}

.chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.msg{
padding:12px;
margin-bottom:10px;
border-radius:12px;
white-space:pre-wrap;
}

.user{
background:#2563eb;
}

.ai{
background:#1f2937;
}

.bottom{
padding:15px;
display:flex;
gap:10px;
background:#1e293b;
}

textarea{
flex:1;
height:60px;
resize:none;
padding:10px;
border:none;
border-radius:10px;
outline:none;
}

button{
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.send{
background:#2563eb;
color:white;
}

.copy{
background:#10b981;
color:white;
}

.test{
background:#f59e0b;
color:white;
}

iframe{
width:100%;
height:300px;
border:none;
background:white;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
🤖 AI Kod Asistanı
</div>

<div class="chat" id="chat"></div>

<div class="bottom">
<textarea id="prompt" placeholder="Bir kod iste..."></textarea>

<button class="send" onclick="sendMessage()">
Gönder
</button>

<button class="copy" onclick="copyLastCode()">
Kopyala
</button>

<button class="test" onclick="testCode()">
Test Et
</button>
</div>

<iframe id="preview"></iframe>

</div>

<script>

const API_KEY = "YOUR_GROQ_API_KEY";

let lastCode = "";

async function sendMessage(){

const input = document.getElementById("prompt");
const text = input.value.trim();

if(!text) return;

addMessage(text,"user");

input.value="";

const res = await fetch(
"https://api.groq.com/openai/v1/chat/completions",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},
body:JSON.stringify({

model:"llama3-70b-8192",

messages:[

{
role:"system",
content:`
Sen dünyanın en iyi kod öğretmenisin.

Görevlerin:

- Kullanıcıya kod yazmayı öğret.
- Kodları ayrıntılı açıkla.
- HTML, CSS, JS, Python, C++, Java öğret.
- Modern kod üret.
- Hataları düzelt.
- Temiz mimari kullan.
- Kod blokları ver.
- Gerektiğinde tam proje oluştur.
`
},

{
role:"user",
content:text
}

],

temperature:0.7

})
}
);

const data = await res.json();

const answer =
data.choices?.[0]?.message?.content ||
"Hata oluştu";

addMessage(answer,"ai");

extractCode(answer);

}

function addMessage(text,type){

const chat=document.getElementById("chat");

const div=document.createElement("div");

div.className="msg "+type;

div.textContent=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

function extractCode(text){

const match=text.match(/```(?:html)?([\s\S]*?)```/);

if(match){

lastCode=match[1];

}

}

function copyLastCode(){

if(!lastCode){

alert("Kod bulunamadı");

return;

}

navigator.clipboard.writeText(lastCode);

alert("Kod kopyalandı");

}

function testCode(){

if(!lastCode){

alert("Test edilecek kod yok");

return;

}

document.getElementById("preview").srcdoc=lastCode;

}

</script>

</body>
</html>
